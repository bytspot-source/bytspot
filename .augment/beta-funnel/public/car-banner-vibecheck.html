<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Bytspot — Car Door Banner (Vibecheck)</title>
  <style>
    @page { size: 610mm 305mm landscape; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .banner { width: 610mm; height: 305mm; background: linear-gradient(135deg, #0d0221 0%, #000000 50%, #020a18 100%); display: flex; flex-direction: row; align-items: center; padding: 48px 72px; position: relative; overflow: hidden; }
    .banner::before { content: ''; position: absolute; top: -80px; left: -80px; width: 420px; height: 420px; border-radius: 50%; background: radial-gradient(circle, rgba(168,85,247,0.28) 0%, transparent 70%); pointer-events: none; }
    .banner::after { content: ''; position: absolute; bottom: -60px; right: 260px; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(0,191,255,0.2) 0%, transparent 70%); pointer-events: none; }
    /* Left content */
    .left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-right: 72px; position: relative; z-index: 1; }
    .brand { display: flex; align-items: center; gap: 18px; margin-bottom: 32px; }
    .logo { width: 80px; height: 80px; flex-shrink: 0; }
    .wm { font-size: 64px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(90deg, #00BFFF, #A855F7, #FF00FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h1 { font-size: 72px; font-weight: 800; line-height: 1.1; letter-spacing: -0.025em; margin-bottom: 28px; }
    h1 em { font-style: normal; background: linear-gradient(90deg, #A855F7, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .feat { display: flex; align-items: center; gap: 18px; padding: 22px 28px; border-radius: 18px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); margin-bottom: 28px; }
    .fi { font-size: 40px; flex-shrink: 0; }
    .ft { font-size: 26px; font-weight: 800; color: #fff; display: block; margin-bottom: 4px; }
    .fd { font-size: 18px; color: rgba(255,255,255,0.5); display: block; }
    .url-line { font-size: 36px; font-weight: 800; letter-spacing: 0.04em; background: linear-gradient(90deg, #00BFFF, #A855F7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    /* Divider */
    .div { width: 2px; height: 240px; align-self: center; background: linear-gradient(180deg, transparent, rgba(168,85,247,0.5), transparent); flex-shrink: 0; position: relative; z-index: 1; }
    /* Right QR */
    .right { display: flex; flex-direction: column; align-items: center; justify-content: center; padding-left: 72px; flex-shrink: 0; position: relative; z-index: 1; gap: 20px; }
    .qb { background: #fff; border-radius: 22px; padding: 16px; }
    .qb img { width: 200px; height: 200px; display: block; }
    .scan-label { font-size: 24px; font-weight: 800; text-align: center; line-height: 1.3; background: linear-gradient(90deg, #A855F7, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .scan-sub { font-size: 15px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.5; }
    .pb { position: fixed; bottom: 24px; right: 24px; padding: 14px 28px; border-radius: 14px; border: none; background: linear-gradient(90deg, #A855F7, #22d3ee); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; z-index: 100; box-shadow: 0 4px 24px rgba(168,85,247,0.3); }
    @media print { .pb { display: none !important; } }
  </style>
</head>
<body>
  <div class="banner">
    <div class="left">
      <div class="brand">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00BFFF"/><stop offset="50%" stop-color="#A855F7"/><stop offset="100%" stop-color="#00BFFF"/></linearGradient>
            <linearGradient id="b" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#D946EF"/></linearGradient>
            <linearGradient id="c" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#A855F7"/><stop offset="50%" stop-color="#D946EF"/><stop offset="100%" stop-color="#FF00FF"/></linearGradient>
            <linearGradient id="d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00BFFF"/><stop offset="100%" stop-color="#FF00FF"/></linearGradient>
            <radialGradient id="e" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00BFFF"/><stop offset="100%" stop-color="#0099CC"/></radialGradient>
            <radialGradient id="f" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00BFFF" stop-opacity="0.35"/><stop offset="100%" stop-color="#00BFFF" stop-opacity="0"/></radialGradient>
          </defs>
          <circle cx="60" cy="60" r="48" fill="none" stroke="url(#a)" stroke-width="3"/>
          <circle cx="60" cy="60" r="38" fill="none" stroke="url(#b)" stroke-width="2" opacity="0.4"/>
          <path d="M60 30 L86 45 L86 75 L60 90 L34 75 L34 45 Z" fill="url(#c)"/>
          <path d="M60 30 L86 45 L86 75 L60 90 L34 75 L34 45 Z" fill="none" stroke="url(#d)" stroke-width="1.5"/>
          <circle cx="60" cy="60" r="12" fill="url(#f)"/><circle cx="60" cy="60" r="8" fill="url(#e)"/>
        </svg>
        <p class="wm">Bytspot</p>
      </div>
      <h1>Know <em>Before</em><br/>You Go.</h1>
      <div class="feat">
        <span class="fi">🔴</span>
        <div>
          <span class="ft">Live Crowd Levels</span>
          <span class="fd">See how busy a venue is right now</span>
        </div>
      </div>
      <p class="url-line">bytspot.com</p>
    </div>
    <div class="div"></div>
    <div class="right">
      <div class="qb">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&format=svg&color=000000&bgcolor=FFFFFF&data=https://bytspot.com/?ref=vibecheck" alt="Scan to join Bytspot beta"/>
      </div>
      <p class="scan-label">Scan to Get<br/>Early Access</p>
      <p class="scan-sub">Free for the first 100 Midtown users</p>
    </div>
  </div>
  <button class="pb" onclick="window.print()">🖨️ Print Banner</button>
</body>
</html>
